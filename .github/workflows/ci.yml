name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test/build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest build twine
          python -m pip install -e .

      - name: Run tests
        run: pytest -q

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*
