name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest build twine
          python -m pip install -e .

      - name: Run tests
        run: pytest -q

      - name: Validate tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c "import pathlib, tomllib; data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])")"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
              echo "Tag version (${TAG_VERSION}) does not match pyproject version (${PACKAGE_VERSION})."
              exit 1
            fi
          fi

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive --skip-existing dist/*
